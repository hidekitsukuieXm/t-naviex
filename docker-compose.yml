# Docker Compose configuration for production environment
# Usage: docker-compose up -d

services:
  # ========================================
  # Next.js Application Service
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t-naviex-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-t_naviex}:${POSTGRES_PASSWORD:-t_naviex_password}@db:5432/${POSTGRES_DB:-t_naviex}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - t-naviex-network

  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:16-alpine
    container_name: t-naviex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-t_naviex}'
      POSTGRES_USER: '${POSTGRES_USER:-t_naviex}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-t_naviex_password}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-t_naviex} -d ${POSTGRES_DB:-t_naviex}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - t-naviex-network

  # ========================================
  # Neo4j Graph Database Service (for Graph RAG)
  # ========================================
  neo4j:
    image: neo4j:5.18-community
    container_name: t-naviex-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: '${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}'
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
      NEO4J_dbms_memory_heap_initial__size: '512m'
      NEO4J_dbms_memory_heap_max__size: '1G'
      NEO4J_dbms_memory_pagecache_size: '512m'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - '${NEO4J_HTTP_PORT:-7474}:7474'
      - '${NEO4J_BOLT_PORT:-7687}:7687'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - t-naviex-network

# ========================================
# Volume Configuration for Data Persistence
# ========================================
volumes:
  postgres_data:
    name: t-naviex-postgres-data
    driver: local
  neo4j_data:
    name: t-naviex-neo4j-data
    driver: local
  neo4j_logs:
    name: t-naviex-neo4j-logs
    driver: local

# ========================================
# Network Configuration
# ========================================
networks:
  t-naviex-network:
    name: t-naviex-network
    driver: bridge
