# Docker Compose configuration for development environment
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  # ========================================
  # Next.js Application Service (Development)
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: t-naviex-app-dev
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-t_naviex}:${POSTGRES_PASSWORD:-t_naviex_password}@db:5432/${POSTGRES_DB:-t_naviex}
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Exclude node_modules from mount to use container's dependencies
      - /app/node_modules
      # Exclude .next build directory
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    networks:
      - t-naviex-dev-network

  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:16-alpine
    container_name: t-naviex-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-t_naviex}'
      POSTGRES_USER: '${POSTGRES_USER:-t_naviex}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-t_naviex_password}'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-t_naviex} -d ${POSTGRES_DB:-t_naviex}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - t-naviex-dev-network

  # ========================================
  # Neo4j Graph Database Service (for Graph RAG)
  # ========================================
  neo4j:
    image: neo4j:5.18-community
    container_name: t-naviex-neo4j-dev
    restart: unless-stopped
    environment:
      NEO4J_AUTH: '${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}'
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
      NEO4J_dbms_memory_heap_initial__size: '256m'
      NEO4J_dbms_memory_heap_max__size: '512m'
      NEO4J_dbms_memory_pagecache_size: '256m'
    volumes:
      - neo4j_data_dev:/data
      - neo4j_logs_dev:/logs
    ports:
      - '${NEO4J_HTTP_PORT:-7474}:7474'
      - '${NEO4J_BOLT_PORT:-7687}:7687'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - t-naviex-dev-network

# ========================================
# Volume Configuration for Data Persistence
# ========================================
volumes:
  postgres_data_dev:
    name: t-naviex-postgres-data-dev
    driver: local
  neo4j_data_dev:
    name: t-naviex-neo4j-data-dev
    driver: local
  neo4j_logs_dev:
    name: t-naviex-neo4j-logs-dev
    driver: local

# ========================================
# Network Configuration
# ========================================
networks:
  t-naviex-dev-network:
    name: t-naviex-dev-network
    driver: bridge
